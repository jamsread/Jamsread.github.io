# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: zh-CN

timezone: Asia/Shanghai

# jekyll-seo-tag settings
title: Jamsread
tagline: C++ 客户端工程师 | 桌面应用 · NAS · 工具链

description: >-
  Jamsread 的个人技术博客，分享 C++、Qt、NAS 工具开发相关的经验与思考。

url: "https://jamsread.github.io"

github:
  username: jamsread

social:
  name: Jamsread
  links:
    - https://github.com/jamsread

# Site Verification Settings
webmaster_verifications:
  google:
  bing:

# Web Analytics Settings
analytics:
  google:
    id:

# Prefer color scheme setting (empty = follow system with toggle)
theme_mode:

# the avatar on sidebar, support local or CORS resources
avatar: https://github.com/jamsread.png

toc: true

comments:
  provider:

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
